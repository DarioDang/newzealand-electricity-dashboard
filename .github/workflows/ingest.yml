# ============================================================
# ingest.yml
# Runs NZ energy ingest pipeline every 30 minutes
# Triggers: cron schedule + manual dispatch
# Compute: GitHub Actions free tier (Ubuntu)
# ============================================================

name: NZ Energy Ingest

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest:
    name: Extract Transform Load
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run:  pip install -r api/requirements.txt

      - name: Run ingest flow
        env:
          PREFECT_API_KEY:  ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL:  ${{ secrets.PREFECT_API_URL }}
          NEON_DB_HOST:     ${{ secrets.NEON_DB_HOST }}
          NEON_DB_PORT:     5432
          NEON_DB_NAME:     ${{ secrets.NEON_DB_NAME }}
          NEON_DB_USER:     ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}
          NEON_DB_SSLMODE:  require
        run: python pipeline/flows/ingest_flow.py