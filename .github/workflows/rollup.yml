# ============================================================
# rollup.yml
# Runs nightly dbt refresh + raw data purge
# Triggers: cron at midnight NZT (12:00 UTC) + manual dispatch
# ============================================================

name: NZ Energy Rollup

on:
  schedule:
    - cron: "30 12 * * *" #00:30 NZT
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rollup:
    name: dbt Run + Purge
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run:  pip install -r api/requirements.txt

      - name: Set up dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          nz_energy_dbt:
            target: prod
            outputs:
              prod:
                type: postgres
                host: ${{ secrets.NEON_DB_HOST }}
                port: 5432
                user: ${{ secrets.NEON_DB_USER }}
                pass: ${{ secrets.NEON_DB_PASSWORD }}
                dbname: ${{ secrets.NEON_DB_NAME }}
                schema: public
                threads: 4
                sslmode: require
          EOF

      - name: Run rollup flow
        env:
          PREFECT_API_KEY:  ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL:  ${{ secrets.PREFECT_API_URL }}
          NEON_DB_HOST:     ${{ secrets.NEON_DB_HOST }}
          NEON_DB_PORT:     5432
          NEON_DB_NAME:     ${{ secrets.NEON_DB_NAME }}
          NEON_DB_USER:     ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}
          NEON_DB_SSLMODE:  require
        run: python pipeline/flows/rollup_flow.py