# ============================================================
# fast_ingest.yml
# Regional prices only — runs every 30 min, no dbt
# ============================================================

name: NZ Regional Price Ingest

on:
  # schedule:
  #   - cron: "7,37 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast-ingest:
    name: Regional Price Ingest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout respository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies 
        run: pip install -r api/requirements.txt
      
      - name: Run fast regional price ingest
        env:
          NEON_DB_HOST:     ${{ secrets.NEON_DB_HOST }}
          NEON_DB_PORT:     5432
          NEON_DB_NAME:     ${{ secrets.NEON_DB_NAME }}
          NEON_DB_USER:     ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}
          NEON_DB_SSLMODE:  require
        run: python pipeline/flows/ingest_regional_fast.py