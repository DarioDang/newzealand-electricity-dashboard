# ============================================================
# NZ Electricity Dashboard — Local Development Stack
# Services: Postgres 15 + pgAdmin 4
# Usage:
#   Start:   docker-compose up -d
#   Stop:    docker-compose down
#   Destroy: docker-compose down -v  (wipes all data)
# ============================================================

services:

  # ----------------------------------------------------------
  # Postgres — primary database
  # ----------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: nz_energy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nz_energy_network

  # ----------------------------------------------------------
  # pgAdmin — web UI to inspect database
  # Access at: http://localhost:5050
  # Login:     PGADMIN_EMAIL / PGADMIN_PASSWORD from .env
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nz_energy_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nz_energy_network

# ============================================================
# Volumes — persist data between container restarts
# ============================================================
volumes:
  postgres_data:
    name: nz_energy_postgres_data
  pgadmin_data:
    name: nz_energy_pgadmin_data

# ============================================================
# Networks
# ============================================================
networks:
  nz_energy_network:
    name: nz_energy_network